<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Icon only: Two interlocking arcs with connection point -->
  <g transform="translate(0, 2)">
    <!-- Left arc (donor - teal) -->
    <path d="M 8 48 Q 8 10, 30 10" stroke="#2C5F5C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 30 10 Q 52 10, 52 48" stroke="#2C5F5C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Right arc (beneficiary - coral) -->
    <path d="M 16 48 Q 16 20, 38 20" stroke="#E07A5F" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 38 20 Q 60 20, 60 48" stroke="#E07A5F" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Connection point -->
    <circle cx="34" cy="28" r="4.5" fill="#D4A574"/>
    <!-- Base -->
    <line x1="4" y1="52" x2="64" y2="52" stroke="#2C5F5C" stroke-width="1.5" opacity="0.3"/>
  </g>
</svg>
