<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80">
  <defs>
    <style>
      .logo-text { font-family: 'Georgia', 'Noto Serif KR', serif; font-weight: 700; }
      .logo-sub { font-family: 'Georgia', 'Noto Serif KR', serif; font-weight: 400; }
    </style>
  </defs>
  <!-- Icon: Two interlocking arcs forming a bridge/connection -->
  <g transform="translate(8, 8)">
    <!-- Left arc (donor) -->
    <path d="M 10 50 Q 10 14, 32 14" stroke="#2C5F5C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 32 14 Q 54 14, 54 50" stroke="#2C5F5C" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Right arc (beneficiary) -->
    <path d="M 22 50 Q 22 22, 44 22" stroke="#E07A5F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 44 22 Q 66 22, 66 50" stroke="#E07A5F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Connection dot at intersection -->
    <circle cx="38" cy="32" r="4" fill="#D4A574"/>
    <!-- Base line -->
    <line x1="6" y1="54" x2="70" y2="54" stroke="#2C5F5C" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Wordmark -->
  <text x="92" y="44" class="logo-text" fill="#2D3436" font-size="32">mumuki</text>
  <text x="92" y="64" class="logo-sub" fill="#636E72" font-size="13" letter-spacing="3">FOUNDATION</text>
</svg>
