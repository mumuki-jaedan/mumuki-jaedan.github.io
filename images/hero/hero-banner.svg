<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <style>
      .hero-title { font-family: 'Georgia', 'Noto Serif KR', serif; }
      .hero-body { font-family: 'Helvetica Neue', 'Noto Sans KR', sans-serif; }
    </style>
  </defs>

  <!-- Background: warm off-white -->
  <rect width="1200" height="400" fill="#F5F1EB"/>

  <!-- Tufte-style thin horizontal rules -->
  <line x1="80" y1="60" x2="1120" y2="60" stroke="#B2BEC3" stroke-width="0.5"/>
  <line x1="80" y1="340" x2="1120" y2="340" stroke="#B2BEC3" stroke-width="0.5"/>

  <!-- Left: Abstract human figures connected by arcs -->
  <g transform="translate(120, 100)" opacity="0.9">
    <!-- Figure 1 (Donor) -->
    <circle cx="40" cy="30" r="14" fill="none" stroke="#2C5F5C" stroke-width="1.5"/>
    <line x1="40" y1="44" x2="40" y2="100" stroke="#2C5F5C" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="20" y2="80" stroke="#2C5F5C" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="60" y2="80" stroke="#2C5F5C" stroke-width="1.5"/>
    <line x1="40" y1="100" x2="24" y2="140" stroke="#2C5F5C" stroke-width="1.5"/>
    <line x1="40" y1="100" x2="56" y2="140" stroke="#2C5F5C" stroke-width="1.5"/>
    <text x="40" y="164" text-anchor="middle" class="hero-body" font-size="11" fill="#636E72">기부자</text>

    <!-- Connection arc (direct donation path) -->
    <path d="M 70 50 Q 160 -20, 250 50" stroke="#D4A574" stroke-width="2" fill="none" stroke-dasharray="6,4"/>
    <!-- Heart at apex of arc -->
    <path d="M 160 8 C 155 -2, 140 -2, 140 10 C 140 20, 160 30, 160 30 C 160 30, 180 20, 180 10 C 180 -2, 165 -2, 160 8Z" fill="#E07A5F" opacity="0.7" transform="scale(0.6) translate(180, -10)"/>

    <!-- Figure 2 (Beneficiary) -->
    <circle cx="280" cy="30" r="14" fill="none" stroke="#E07A5F" stroke-width="1.5"/>
    <line x1="280" y1="44" x2="280" y2="100" stroke="#E07A5F" stroke-width="1.5"/>
    <line x1="280" y1="60" x2="260" y2="80" stroke="#E07A5F" stroke-width="1.5"/>
    <line x1="280" y1="60" x2="300" y2="80" stroke="#E07A5F" stroke-width="1.5"/>
    <line x1="280" y1="100" x2="264" y2="140" stroke="#E07A5F" stroke-width="1.5"/>
    <line x1="280" y1="100" x2="296" y2="140" stroke="#E07A5F" stroke-width="1.5"/>
    <text x="280" y="164" text-anchor="middle" class="hero-body" font-size="11" fill="#636E72">수혜자</text>

    <!-- Small label on arc -->
    <text x="160" y="46" text-anchor="middle" class="hero-body" font-size="9" fill="#D4A574">다이렉트</text>
  </g>

  <!-- Right: Typography block (Tufte margin note style) -->
  <g transform="translate(560, 100)">
    <text x="0" y="0" class="hero-title" font-size="36" fill="#2D3436" font-weight="700">기부의 새로운 길,</text>
    <text x="0" y="48" class="hero-title" font-size="36" fill="#2C5F5C" font-weight="700">직접 연결합니다</text>

    <line x1="0" y1="68" x2="120" y2="68" stroke="#D4A574" stroke-width="1.5"/>

    <text x="0" y="100" class="hero-body" font-size="15" fill="#636E72">무무키 파운데이션은 기부자와 수혜자를</text>
    <text x="0" y="124" class="hero-body" font-size="15" fill="#636E72">수평적 관계로 직접 연결하여,</text>
    <text x="0" y="148" class="hero-body" font-size="15" fill="#636E72">투명하고 지속가능한 나눔을 실현합니다.</text>

    <!-- Margin note (Tufte style) -->
    <g transform="translate(440, 88)">
      <line x1="0" y1="0" x2="0" y2="60" stroke="#B2BEC3" stroke-width="0.5"/>
      <text x="12" y="12" class="hero-body" font-size="10" fill="#B2BEC3" font-style="italic">전체 회계 내역</text>
      <text x="12" y="26" class="hero-body" font-size="10" fill="#B2BEC3" font-style="italic">100% 공개</text>
      <text x="12" y="40" class="hero-body" font-size="10" fill="#B2BEC3" font-style="italic">Charity Water</text>
      <text x="12" y="54" class="hero-body" font-size="10" fill="#B2BEC3" font-style="italic">모델 준용</text>
    </g>
  </g>

  <!-- Bottom: Three key stats (Tufte sparkline style) -->
  <g transform="translate(120, 360)">
    <text x="0" y="0" class="hero-body" font-size="11" fill="#2C5F5C" font-weight="600">회계 100% 공개</text>
    <circle cx="120" cy="-4" r="2" fill="#B2BEC3"/>
    <text x="132" y="0" class="hero-body" font-size="11" fill="#E07A5F" font-weight="600">운영비 별도 조달</text>
    <circle cx="266" cy="-4" r="2" fill="#B2BEC3"/>
    <text x="278" y="0" class="hero-body" font-size="11" fill="#D4A574" font-weight="600">외부 감사 연차 공개</text>
  </g>
</svg>
