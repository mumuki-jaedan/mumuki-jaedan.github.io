<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480">
  <defs>
    <style>
      .t-title { font-family: 'Georgia', 'Noto Serif KR', serif; font-weight: 700; }
      .t-body { font-family: 'Helvetica Neue', 'Noto Sans KR', sans-serif; }
      .t-label { font-family: 'Helvetica Neue', 'Noto Sans KR', sans-serif; font-size: 10px; }
    </style>
  </defs>

  <rect width="640" height="480" fill="#F5F1EB"/>

  <text x="320" y="36" text-anchor="middle" class="t-title" font-size="20" fill="#2D3436">조직 구성(안)</text>
  <line x1="60" y1="46" x2="580" y2="46" stroke="#B2BEC3" stroke-width="0.5"/>

  <!-- Level 1: Board of Directors -->
  <g transform="translate(320, 86)">
    <rect x="-80" y="-20" width="160" height="40" rx="4" fill="#2C5F5C" fill-opacity="0.1" stroke="#2C5F5C" stroke-width="1.2"/>
    <text x="0" y="6" text-anchor="middle" class="t-body" font-size="14" fill="#2C5F5C" font-weight="700">이사회</text>
    <!-- Margin note -->
    <text x="100" y="-6" class="t-label" fill="#636E72" font-style="italic">전문직 중심 구성</text>
    <text x="100" y="8" class="t-label" fill="#636E72" font-style="italic">교육 기부자 중심 각계 인사</text>
  </g>

  <!-- Vertical line from Board -->
  <line x1="320" y1="106" x2="320" y2="140" stroke="#2C5F5C" stroke-width="1"/>

  <!-- Level 2: Horizontal connector -->
  <line x1="120" y1="140" x2="520" y2="140" stroke="#2C5F5C" stroke-width="1"/>

  <!-- Level 2a: Chairman Group -->
  <line x1="120" y1="140" x2="120" y2="160" stroke="#2C5F5C" stroke-width="1"/>
  <g transform="translate(120, 186)">
    <rect x="-70" y="-20" width="140" height="40" rx="4" fill="#E07A5F" fill-opacity="0.1" stroke="#E07A5F" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle" class="t-body" font-size="13" fill="#E07A5F" font-weight="600">회장단</text>
    <text x="0" y="34" class="t-label" fill="#636E72" font-style="italic" text-anchor="middle">기부/후원 발굴</text>
    <text x="0" y="48" class="t-label" fill="#636E72" font-style="italic" text-anchor="middle">대표 = 이사장 겸직</text>
  </g>

  <!-- Level 2b: Secretariat -->
  <line x1="320" y1="140" x2="320" y2="160" stroke="#2C5F5C" stroke-width="1"/>
  <g transform="translate(320, 186)">
    <rect x="-70" y="-20" width="140" height="40" rx="4" fill="#2C5F5C" fill-opacity="0.1" stroke="#2C5F5C" stroke-width="1.2"/>
    <text x="0" y="6" text-anchor="middle" class="t-body" font-size="13" fill="#2C5F5C" font-weight="700">사무국</text>
    <text x="0" y="34" class="t-label" fill="#636E72" font-style="italic" text-anchor="middle">실질 운영 중심</text>
    <text x="0" y="48" class="t-label" fill="#636E72" font-style="italic" text-anchor="middle">김두선 전 센터장 중심</text>
  </g>

  <!-- Level 2c: Auditor -->
  <line x1="520" y1="140" x2="520" y2="160" stroke="#2C5F5C" stroke-width="1"/>
  <g transform="translate(520, 186)">
    <rect x="-60" y="-20" width="120" height="40" rx="4" fill="#D4A574" fill-opacity="0.15" stroke="#D4A574" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle" class="t-body" font-size="13" fill="#D4A574" font-weight="600">감사</text>
    <text x="0" y="34" class="t-label" fill="#636E72" font-style="italic" text-anchor="middle">외부 회계감사 연차 발행</text>
    <text x="0" y="48" class="t-label" fill="#636E72" font-style="italic" text-anchor="middle">법적 공시 요건 무관</text>
  </g>

  <!-- Mutual check arrows (dotted, between Chairman and Board/Secretariat) -->
  <path d="M 170 174 Q 220 150, 250 174" stroke="#B2BEC3" stroke-width="0.8" fill="none" stroke-dasharray="3,3"/>
  <text x="210" y="148" text-anchor="middle" class="t-label" fill="#B2BEC3">상호 견제</text>

  <!-- Secretariat sub-units -->
  <line x1="320" y1="206" x2="320" y2="260" stroke="#2C5F5C" stroke-width="0.8"/>
  <line x1="180" y1="260" x2="460" y2="260" stroke="#2C5F5C" stroke-width="0.8"/>

  <!-- Sub 1: Project Discovery -->
  <line x1="180" y1="260" x2="180" y2="278" stroke="#2C5F5C" stroke-width="0.8"/>
  <g transform="translate(180, 302)">
    <rect x="-56" y="-20" width="112" height="36" rx="3" fill="none" stroke="#2C5F5C" stroke-width="0.8"/>
    <text x="0" y="-2" text-anchor="middle" class="t-body" font-size="11" fill="#2C5F5C">발굴 프로젝트</text>
    <text x="0" y="12" text-anchor="middle" class="t-label" fill="#636E72">복지 수요 발굴</text>
  </g>

  <!-- Sub 2: Planning -->
  <line x1="320" y1="260" x2="320" y2="278" stroke="#2C5F5C" stroke-width="0.8"/>
  <g transform="translate(320, 302)">
    <rect x="-56" y="-20" width="112" height="36" rx="3" fill="none" stroke="#2C5F5C" stroke-width="0.8"/>
    <text x="0" y="-2" text-anchor="middle" class="t-body" font-size="11" fill="#2C5F5C">기획 / 관리</text>
    <text x="0" y="12" text-anchor="middle" class="t-label" fill="#636E72">분과별 계획 수립</text>
  </g>

  <!-- Sub 3: Operations -->
  <line x1="460" y1="260" x2="460" y2="278" stroke="#2C5F5C" stroke-width="0.8"/>
  <g transform="translate(460, 302)">
    <rect x="-56" y="-20" width="112" height="36" rx="3" fill="none" stroke="#2C5F5C" stroke-width="0.8"/>
    <text x="0" y="-2" text-anchor="middle" class="t-body" font-size="11" fill="#2C5F5C">조직 운영</text>
    <text x="0" y="12" text-anchor="middle" class="t-label" fill="#636E72">비상근 인력 채용</text>
  </g>

  <!-- Bottom: Governance note -->
  <line x1="60" y1="370" x2="580" y2="370" stroke="#B2BEC3" stroke-width="0.5"/>
  <g transform="translate(60, 390)">
    <text x="0" y="0" class="t-label" fill="#636E72" font-style="italic">* 회장단에 이사회 및 사무국 대상 자료/정보 열람권 부여 &#x2192; 상호 견제 유도</text>
    <text x="0" y="16" class="t-label" fill="#636E72" font-style="italic">* 차후 구성은 당사자 의사 등을 확인하는 과정에서 변동될 수 있음</text>
    <text x="0" y="32" class="t-label" fill="#636E72" font-style="italic">* 행정/법적 책임 부담은 이사회에 있으므로, 교육 기부자의 의사 존중</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 450)">
    <rect x="0" y="-6" width="12" height="12" rx="2" fill="#2C5F5C" fill-opacity="0.1" stroke="#2C5F5C" stroke-width="0.8"/>
    <text x="18" y="4" class="t-label" fill="#2D3436">운영 조직</text>
    <rect x="90" y="-6" width="12" height="12" rx="2" fill="#E07A5F" fill-opacity="0.1" stroke="#E07A5F" stroke-width="0.8"/>
    <text x="108" y="4" class="t-label" fill="#2D3436">후원 조직</text>
    <rect x="180" y="-6" width="12" height="12" rx="2" fill="#D4A574" fill-opacity="0.15" stroke="#D4A574" stroke-width="0.8"/>
    <text x="198" y="4" class="t-label" fill="#2D3436">감사 조직</text>
  </g>
</svg>
