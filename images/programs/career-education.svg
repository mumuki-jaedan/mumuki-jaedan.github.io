<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      .t-title { font-family: 'Georgia', 'Noto Serif KR', serif; font-weight: 700; }
      .t-body { font-family: 'Helvetica Neue', 'Noto Sans KR', sans-serif; }
      .t-label { font-family: 'Helvetica Neue', 'Noto Sans KR', sans-serif; font-size: 10px; }
    </style>
  </defs>

  <rect width="600" height="400" fill="#F5F1EB"/>

  <text x="40" y="36" class="t-title" font-size="20" fill="#2D3436">주말 직업 교육</text>
  <line x1="40" y1="46" x2="560" y2="46" stroke="#B2BEC3" stroke-width="0.5"/>
  <text x="40" y="66" class="t-body" font-size="11" fill="#636E72" font-style="italic">전문직 및 C-Level 멘토와 함께하는 꿈과 희망 키우기</text>

  <!-- Central: Hub and spoke diagram -->
  <!-- Center: Student -->
  <g transform="translate(300, 200)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="#E07A5F" stroke-width="1.5"/>
    <circle cx="0" cy="-10" r="8" fill="none" stroke="#E07A5F" stroke-width="1"/>
    <line x1="0" y1="-2" x2="0" y2="16" stroke="#E07A5F" stroke-width="1"/>
    <text x="0" y="30" text-anchor="middle" class="t-body" font-size="10" fill="#E07A5F" font-weight="600">학생</text>
  </g>

  <!-- Spoke 1: Doctor (top-left) -->
  <line x1="270" y1="172" x2="140" y2="100" stroke="#B2BEC3" stroke-width="0.8" stroke-dasharray="4,3"/>
  <g transform="translate(110, 80)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#2C5F5C" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" class="t-body" font-size="18" fill="#2C5F5C">+</text>
    <text x="0" y="34" text-anchor="middle" class="t-label" fill="#2D3436" font-weight="600">의사</text>
  </g>

  <!-- Spoke 2: Lawyer (top) -->
  <line x1="300" y1="164" x2="300" y2="100" stroke="#B2BEC3" stroke-width="0.8" stroke-dasharray="4,3"/>
  <g transform="translate(300, 76)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#2C5F5C" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" class="t-body" font-size="14" fill="#2C5F5C">&#x2696;</text>
    <text x="0" y="34" text-anchor="middle" class="t-label" fill="#2D3436" font-weight="600">법률가</text>
  </g>

  <!-- Spoke 3: CEO (top-right) -->
  <line x1="330" y1="172" x2="460" y2="100" stroke="#B2BEC3" stroke-width="0.8" stroke-dasharray="4,3"/>
  <g transform="translate(490, 80)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#2C5F5C" stroke-width="1"/>
    <rect x="-8" y="-8" width="16" height="12" rx="1" fill="none" stroke="#2C5F5C" stroke-width="0.8"/>
    <text x="0" y="34" text-anchor="middle" class="t-label" fill="#2D3436" font-weight="600">CEO</text>
  </g>

  <!-- Spoke 4: Engineer (bottom-left) -->
  <line x1="270" y1="228" x2="140" y2="300" stroke="#B2BEC3" stroke-width="0.8" stroke-dasharray="4,3"/>
  <g transform="translate(110, 320)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#2C5F5C" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" class="t-body" font-size="14" fill="#2C5F5C">&#x2699;</text>
    <text x="0" y="34" text-anchor="middle" class="t-label" fill="#2D3436" font-weight="600">엔지니어</text>
  </g>

  <!-- Spoke 5: Teacher (bottom) -->
  <line x1="300" y1="236" x2="300" y2="300" stroke="#B2BEC3" stroke-width="0.8" stroke-dasharray="4,3"/>
  <g transform="translate(300, 324)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#2C5F5C" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" class="t-body" font-size="14" fill="#2C5F5C">&#x270E;</text>
    <text x="0" y="34" text-anchor="middle" class="t-label" fill="#2D3436" font-weight="600">교수</text>
  </g>

  <!-- Spoke 6: Artist (bottom-right) -->
  <line x1="330" y1="228" x2="460" y2="300" stroke="#B2BEC3" stroke-width="0.8" stroke-dasharray="4,3"/>
  <g transform="translate(490, 320)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="#2C5F5C" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" class="t-body" font-size="14" fill="#2C5F5C">&#x266B;</text>
    <text x="0" y="34" text-anchor="middle" class="t-label" fill="#2D3436" font-weight="600">예술가</text>
  </g>

  <!-- Sidenote (Tufte margin note) -->
  <g transform="translate(40, 180)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#D4A574" stroke-width="0.5"/>
    <text x="8" y="12" class="t-label" fill="#D4A574" font-style="italic">중2 이상 대상</text>
    <text x="8" y="26" class="t-label" fill="#D4A574" font-style="italic">연 10회 / 월 1회</text>
    <text x="8" y="40" class="t-label" fill="#D4A574" font-style="italic">ZOOM 실시간 가능</text>
    <text x="8" y="54" class="t-label" fill="#D4A574" font-style="italic">사후 동영상 활용</text>
    <text x="8" y="68" class="t-label" fill="#D4A574" font-style="italic">점심 식사 포함</text>
  </g>
</svg>
